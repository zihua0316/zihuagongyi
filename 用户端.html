<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>子画公益 · 用户端</title>
  <style>
    /* ========== 基础样式（与原用户端完全一致） ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    
    .cute-panel {
      width: 360px;
      height: 370px;
      background: #ffd9e8 url('https://s41.ax1x.com/2026/03/04/pe93BKU.jpg') center/cover;
      border-radius: 35px;
      overflow: hidden;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 3px 8px rgba(245, 120, 160, 0.1);
      display: flex;
      flex-direction: column;
      border: none;
      position: relative;
    }
    
    /* 气泡动画 */
    .bubble {
      position: absolute;
      background: radial-gradient(circle, rgba(255, 220, 235, 0.4) 0%, rgba(255, 180, 210, 0.15) 100%);
      box-shadow: 0 0 15px rgba(255, 136, 176, 0.6);
      border-radius: 45%;
      z-index: 0;
      animation: floatFall linear infinite;
      pointer-events: none;
      opacity: 0;
    }
    
    @keyframes floatFall {
      0% { transform: translateY(-50px) scale(0.3); opacity: 0; }
      10% { opacity: 0.9; }
      85% { transform: translateY(300px) scale(0.9); opacity: 0.8; }
      100% { transform: translateY(380px) scale(0.7); opacity: 0; }
    }
    
    .cute-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: inherit;
      pointer-events: none;
      z-index: 20;
    }
    
    /* 头部按钮组 */
    .header-btns {
      position: absolute;
      top: 8px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 9999;
      gap: 8px;
    }
    
    .header-btn {
      background: rgba(255, 136, 176, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      color: #fff;
      font-size: 10px;
      padding: 3px 7px;
      cursor: pointer;
      white-space: nowrap;
    }
    
    /* 下拉菜单 */
    .dropdown {
      position: relative;
      display: inline-block;
    }
    
    .dropdown-content {
      display: none;
      position: absolute;
      background: #ffd9e8;
      min-width: 100px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      z-index: 10000;
      top: 22px;
      left: 0;
      backdrop-filter: blur(4px);
      border: 1px solid #ff88b0;
    }
    
    .dropdown-content a {
      color: #c43e6e;
      padding: 6px 12px;
      text-decoration: none;
      display: block;
      font-size: 11px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
    }
    
    .dropdown-content a:hover {
      background: #ff88b0;
      color: white;
    }
    
    .dropdown.open .dropdown-content {
      display: block;
    }
    
    /* 头像区域 */
    .header-area {
      position: relative;
      z-index: 10;
      padding: 2px 0;
      margin-top: 26px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .top-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      border: 2px solid #ff88b0;
      margin-bottom: 3px;
    }
    
    .panel-title {
      font-size: 15px;
      font-weight: 700;
      color: #c43e6e;
      text-shadow: 0 2px 6px #ffeef4;
    }
    
    .panel-title::before,
    .panel-title::after {
      content: '🐱';
      font-size: 15px;
    }
    
    /* 主内容区域 */
    .main-content {
      flex: 1;
      position: relative;
      z-index: 10;
      display: flex;
      padding: 0 10px 8px 10px;
      gap: 8px;
      min-height: 0;
    }
    
    .func-slot {
      width: 90px;
      background: transparent;
      border-radius: 16px;
      padding: 10px 5px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    
    .slot-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: #c43e6e;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: 0.2s;
      padding: 9.5px 0;
    }
    
    .slot-card.active,
    .slot-card:hover {
      background: rgba(255, 136, 176, 0.5);
      color: #fff;
    }
    
    .panel-inner {
      flex: 1;
      width: 0;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 6px;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    
    .func-content {
      height: 100%;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    
    .func-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 6px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    /* 粉色小滑块样式 */
    .pink-slider {
      -webkit-appearance: none;
      width: 90px;
      height: 3px;
      background: rgba(255, 136, 176, 0.5);
      border-radius: 3px;
      outline: none;
      margin: 0 8px;
    }
    .pink-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff88b0;
      border: 1px solid #fff;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .pink-slider::-webkit-slider-thumb:active {
      transform: scale(1.1);
    }
    
    .func-title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    
    .func-title {
      font-size: 15px;
      color: #b13e69;
      font-weight: 550;
    }
    
    .paw {
      color: #ff88b0;
      font-size: 12px;
    }
    
    /* 开关样式 */
    .switch {
      --size: 1.15em;
      font-size: 11px;
      position: relative;
      display: inline-block;
      width: 3.2em;
      height: 2em;
    }
    
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    
    .slider {
      position: absolute;
      inset: 0;
      background: rgba(255, 190, 210, 0.4);
      border: 1px solid rgba(255, 136, 176, 0.3);
      border-radius: 999px;
      transition: 0.3s;
    }
    
    .knob {
      position: absolute;
      height: var(--size);
      width: var(--size);
      left: 0.3em;
      bottom: 0.4em;
      transition: transform 0.4s cubic-bezier(0.34, 1.3, 0.6, 1);
      transform-style: preserve-3d;
    }
    
    .knob-face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      backface-visibility: hidden;
      display: grid;
      place-items: center;
      font-size: 9px;
      border: 1px solid #fff;
    }
    
    .knob-front {
      background: linear-gradient(145deg, #ffd9e8, #ff88b0);
      color: #fff;
    }
    
    .knob-back {
      background: linear-gradient(145deg, #ff88b0, #c43e6e);
      color: #ffe0f0;
      transform: rotateY(180deg);
    }
    
    input:checked~.knob {
      transform: translateX(1.4em) rotateY(180deg);
    }
    
    input:checked~.slider {
      background: #ff88b0;
      box-shadow: 0 0 8px rgba(255, 136, 176, 0.5);
    }
    
    .content-item {
      display: none;
      height: 100%;
    }
    
    .content-item.active {
      display: block;
    }
    
    .resize-handle {
      position: absolute;
      right: 6px;
      bottom: 6px;
      width: 20px;
      height: 20px;
      border-right: 3px solid #c43e6e;
      border-bottom: 3px solid #c43e6e;
      border-radius: 0 0 10px 0;
      cursor: default;
      z-index: 9999;
    }
    
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #ff88b0;
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 99999;
      opacity: 0;
      animation: toast 2s forwards;
    }
    
    @keyframes toast {
      0% { opacity: 0; transform: translate(-50%, -60%); }
      20% { opacity: 1; transform: translate(-50%, -50%); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -40%); }
    }
    
    .confirm-layer {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      border-radius: 35px;
    }
    
    .confirm-box {
      width: 240px;
      background: #ffd9e8;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      border: 1px solid #ff88b0;
    }
    
    .confirm-text {
      font-size: 14px;
      color: #c43e6e;
      margin-bottom: 20px;
    }
    
    .confirm-btns {
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }
    
    .confirm-yes,
    .confirm-no {
      flex: 1;
      padding: 8px 0;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      background: #ff88b0;
      color: #fff;
      border: none;
    }
    
    /* 登录层 */
    .auth-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://s41.ax1x.com/2026/03/04/pe93BKU.jpg') center/cover;
      backdrop-filter: blur(4px);
      z-index: 9999999;
      border-radius: 35px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px;
      pointer-events: auto;
    }
    
    .auth-tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 6px;
    }
    
    .auth-tab {
      font-size: 18px;
      font-weight: 800;
      color: #c43e6e;
      padding: 4px 16px;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: 0.2s;
    }
    
    .auth-tab.active {
      background: #ff88b0;
      color: #fff;
      box-shadow: 0 4px 12px rgba(255, 136, 176, 0.4);
    }
    
    .auth-form {
      width: 85%;
      max-width: 260px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .auth-input {
      padding: 8px 14px;
      border: 2px solid rgba(255, 136, 176, 0.8);
      border-radius: 60px;
      outline: none;
      font-size: 13px;
      color: #c43e6e;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(4px);
      text-align: center;
      font-weight: 500;
    }
    
    .auth-btn {
      padding: 8px 0;
      border: none;
      border-radius: 60px;
      background: #ff88b0;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 12px rgba(255, 136, 176, 0.3);
    }
    
    .auth-tip {
      font-size: 10px;
      color: #b66b8a;
      text-align: center;
      background: rgba(255, 255, 255, 0.6);
      padding: 3px 8px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }
    
    .user-info-bar {
      background: rgba(255, 136, 176, 0.2);
      margin: 4px 12px 0;
      border-radius: 20px;
      padding: 4px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    
    .user-qq-badge {
      background: rgba(255, 136, 176, 0.6);
      border-radius: 30px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      color: white;
      white-space: nowrap;
    }
    
    .expire-badge {
      background: rgba(255, 136, 176, 0.6);
      border-radius: 30px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      color: white;
      font-family: monospace;
      white-space: nowrap;
    }
    
    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #fff;
      border-top-color: #c43e6e;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .tips-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 235, 240, 0.98);
      border-radius: 20px;
      padding: 12px;
      z-index: 999999;
      width: 250px;
      max-height: 360px;
      overflow-y: auto;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
      border: 1px solid #ffc0d0;
    }
    
    .tips-title {
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
      color: #c43e6e;
    }
    
    .tips-content {
      line-height: 2;
      margin-bottom: 8px;
      font-size: 12px;
      color: #b13e69;
    }
    
    .tips-content p {
      margin-bottom: 4px;
    }
    
    .tips-btn {
      width: 100%;
      padding: 6px 0;
      border: none;
      border-radius: 40px;
      background: #ff88b0;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* 皮肤模块 */
    .skin-page {
      display: none;
      height: 100%;
    }
    
    .skin-page.active {
      display: block;
    }
    
    .role-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      width: 100%;
    }
    
    .role-btn {
      width: 100%;
      padding: 9px 0;
      border-radius: 8px;
      border: 1px solid rgba(255, 136, 176, 0.1);
      background: rgba(255, 136, 176, 0.1);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
    }
    
    .part-bar {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      margin-bottom: 6px;
    }
    
    .part-btn {
      width: 100%;
      padding: 21px 0;
      border-radius: 20px;
      border: 1px solid rgba(255, 136, 176, 0.1);
      background: rgba(255, 136, 176, 0.1);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
    }
    
    .skin-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      width: 100%;
    }
    
    .skin-btn {
      width: 100%;
      padding: 10px 0;
      border-radius: 8px;
      border: 1px solid rgba(255, 136, 176, 0.1);
      background: rgba(255, 136, 176, 0.1);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
    }
    
    .restore-skin-btn {
      width: 100%;
      padding: 6px 0;
      border-radius: 8px;
      border: 1px solid rgba(255, 136, 176, 0.4);
      background: rgba(255, 136, 176, 0.6);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      grid-column: span 2;
    }
    
    .main-btn {
      width: 100%;
      padding: 43px 0;
      border-radius: 12px;
      border: 1px solid rgba(255, 136, 176, 0.1);
      background: rgba(255, 136, 176, 0.1);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      cursor: pointer;
    }
    
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      height: 22px;
    }
    
    .title-text {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: rgba(255, 136, 176, 0.3);
      border-radius: 8px;
      padding: 2px 8px;
      display: inline-block;
    }
    
    .small-back-btn {
      padding: 3px 6px;
      font-size: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 136, 176, 0.4);
      background: rgba(255, 136, 176, 0.3);
      color: #fff;
      cursor: pointer;
    }
    
    /* 音乐播放器 */
    .music-player {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      color: #c43e6e;
      padding-top: 4px;
    }
    
    .playlist-fold-bar {
      width: 90%;
      height: 28px;
      background: rgba(255, 136, 176, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid rgba(255, 136, 176, 0.3);
      position: relative;
    }
    
    .fold-arrow {
      position: absolute;
      right: 12px;
      transition: transform 0.3s;
      font-size: 11px;
    }
    
    .fold-arrow.open {
      transform: rotate(180deg);
    }
    
    .playlist-container {
      width: 90%;
      max-height: 0;
      overflow: hidden;
      overflow-y: auto;
      transition: max-height 0.4s ease;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
    }
    
    .playlist-container.open {
      max-height: 160px;
      padding: 6px;
    }
    
    .playlist-item {
      padding: 5px 8px;
      font-size: 11px;
      color: #b13e69;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      overflow-x: hidden;
      text-overflow: ellipsis;
    }
    
    .playlist-item:hover,
    .playlist-item.active {
      background: rgba(255, 136, 176, 0.5);
      color: #fff;
    }
    
    .pink-audio {
      width: 90%;
      height: 34px;
      border-radius: 17px;
      background: #ffd9e8;
      border: 1px solid #ff88b0;
      padding: 0 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .audio-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ff88b0;
      color: #fff;
      border: none;
      font-size: 11px;
      display: grid;
      place-items: center;
      cursor: pointer;
    }
    
    .audio-progress {
      flex: 1;
      height: 4px;
      appearance: none;
      background: rgba(255, 136, 176, 0.3);
      border-radius: 3px;
    }
    
    .audio-progress::-webkit-slider-thumb {
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #ff88b0;
    }
    
    .paw-small {
      color: #ff88b0;
      font-size: 9px;
    }
    
    .player-controls {
      display: flex;
      justify-content: center;
      gap: 16px;
      width: 100%;
    }
    
    .control-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #ffd9e8;
      border: 1px solid #ff88b0;
      color: #c43e6e;
      font-size: 16px;
      display: grid;
      place-items: center;
      cursor: pointer;
    }
    
    .song-title {
      font-size: 13px;
      color: #b13e69;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
      height: 18px;
      font-weight: 600;
    }
    
    .auth-loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
      border-radius: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000001;
    }
    
    .auth-loading-box {
      background: rgba(255, 217, 232, 0.95);
      border-radius: 60px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      border: 1px solid #ff88b0;
    }
    
    .auth-loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #ff88b0;
      border-top-color: #c43e6e;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    
    .auth-loading-text {
      color: #c43e6e;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div class="cute-panel" id="panel">
    <!-- 登录层 -->

  <script>
    // ========== 双 Bin 配置 ==========
    // 主 Bin（存用户数据）- 用户端只读
    const MAIN_BIN_ID = "69df8413aaba882197006c91";
    // 申请 Bin（存注册申请）- 用户端可写
    const APP_BIN_ID = "69df8462856a682189383090";
    // Access Key（只有 CREATE + READ 权限，没有 DELETE/UPDATE）
    const ACCESS_KEY = "$2a$10$oCG/T5dVtP2cpVkb59s3j.rfu5YamDHQv8reuyk472KfkOhTWbgWq";
    
    let currentUser = null;
    let expireInterval = null;
    
    function getDeviceId() {
      let id = localStorage.getItem('device_id');
      if (!id) {
        id = 'device_' + Math.random().toString(36).substr(2, 16) + '_' + Date.now();
        localStorage.setItem('device_id', id);
      }
      return id;
    }
    
    function showToast(msg) {
      let t = document.createElement('div');
      t.className = 'toast';
      t.innerText = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2000);
    }
    
    function copyText(text) {
      let i = document.createElement('input');
      i.value = text;
      document.body.appendChild(i);
      i.select();
      document.execCommand('copy');
      document.body.removeChild(i);
    }
    
    // ========== 从主 Bin 读取用户数据（只读，使用 Access Key 的 READ 权限） ==========
    async function fetchUsersFromCloud() {
      try {
        const url = `https://api.jsonbin.io/v3/b/${MAIN_BIN_ID}/latest?nocache=${Date.now()}`;
        const res = await fetch(url, {
          headers: { "X-Access-Key": ACCESS_KEY }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return data.record?.users || [];
      } catch (e) {
        console.error(e);
        return [];
      }
    }
    
    // ========== 提交注册申请（写入申请 Bin） ==========
    async function submitApplication(qq, pwd) {
      try {
        // 1. 先检查主 Bin 是否已存在该用户
        const users = await fetchUsersFromCloud();
        if (users.find(u => u.qq === qq)) {
          return { ok: false, msg: '该QQ号已注册' };
        }
        
        // 2. 读取申请 Bin 现有申请
        const res = await fetch(`https://api.jsonbin.io/v3/b/${APP_BIN_ID}/latest`, {
          headers: { "X-Access-Key": ACCESS_KEY }
        });
        const data = await res.json();
        let applications = data.record?.applications || [];
        
        // 3. 检查是否已有待审核申请
        if (applications.find(a => a.qq === qq && a.status === 'pending')) {
          return { ok: false, msg: '已有待审核的申请，请联系管理员审核' };
        }
        
        // 4. 添加新申请
        applications.push({
          qq: qq,
          pwd: pwd,
          status: 'pending',
          applyTime: Date.now(),
          deviceId: getDeviceId()
        });
        
        // 5. 保存申请
        await fetch(`https://api.jsonbin.io/v3/b/${APP_BIN_ID}`, {
          method: 'PUT',
          headers: {
            "X-Access-Key": ACCESS_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ applications: applications })
        });
        
        return { ok: true, msg: '申请已提交，请联系管理员审核' };
      } catch(e) {
        console.error(e);
        return { ok: false, msg: '提交失败：' + e.message };
      }
    }
    
    // ========== 登录验证（只读主 Bin，不写入） ==========
    async function login(qq, pwd) {
      let users = await fetchUsersFromCloud();
      let user = users.find(u => u.qq === qq);
      
      if (!user) return { ok: false, msg: 'QQ号不存在，请先注册' };
      if (user.pwd !== pwd) return { ok: false, msg: '密码错误' };
      if (user.status === 'pending') return { ok: false, msg: '账号待审核，请联系管理员' };
      if (user.status === 'disabled') return { ok: false, msg: '账号已被禁用' };
      if (user.status === 'active' && user.expireTs && Date.now() > user.expireTs) {
        return { ok: false, msg: '使用期限已过期，请联系管理员续期' };
      }
      
      const devId = getDeviceId();
      // 注意：设备绑定验证从云端读取，但用户端没有写入权限
      // 所以首次登录时如果设备未绑定，需要联系管理员绑定
      if (user.bindDevice && user.bindDevice !== devId) {
        return { ok: false, msg: '该账号已绑定其他设备，禁止多设备登录' };
      }
      
      // 如果用户没有绑定设备，提示联系管理员绑定（用户端无法自动绑定）
      if (!user.bindDevice) {
        return { ok: false, msg: '请使用管理端先绑定您的设备ID: ' + devId.substr(0, 16) + '...\n联系管理员操作' };
      }
      
      return { ok: true, user: user };
    }
    
    function formatRemaining(expireTs) {
      if (!expireTs) return '未设置';
      if (expireTs === 8640000000000000) return '永久有效';
      let remain = expireTs - Date.now();
      if (remain <= 0) return '已过期';
      let days = Math.floor(remain / 86400000);
      let hours = Math.floor((remain % 86400000) / 3600000);
      let minutes = Math.floor((remain % 3600000) / 60000);
      let seconds = Math.floor((remain % 60000) / 1000);
      return `${days}天 ${hours}时 ${minutes}分 ${seconds}秒`;
    }
    
    function startExpireTimer() {
      if (expireInterval) clearInterval(expireInterval);
      const update = () => {
        if (currentUser && currentUser.expireTs) {
          const remainText = formatRemaining(currentUser.expireTs);
          document.getElementById('expireSpan').innerText = `⏱️ ${remainText}`;
          if (remainText === '已过期') {
            showToast('使用已过期，请重新登录');
            logout();
          }
        }
      };
      update();
      expireInterval = setInterval(update, 1000);
    }
    
    function onLoginSuccess(user) {
      currentUser = user;
      localStorage.setItem('zihua_auth_qq', user.qq);
      document.getElementById('authLayer').style.display = 'none';
      document.getElementById('mainHeaderBtns').style.display = 'flex';
      document.getElementById('mainContentWrapper').style.display = 'flex';
      document.getElementById('userInfoBar').style.display = 'flex';
      document.getElementById('userQqSpan').innerHTML = `🐧 ${user.qq}`;
      startExpireTimer();
      showTipsToast();
      setupAdminCopy();
    }
    
    function logout() {
      if (expireInterval) clearInterval(expireInterval);
      localStorage.removeItem('zihua_auth_qq');
      currentUser = null;
      document.getElementById('authLayer').style.display = 'flex';
      document.getElementById('mainHeaderBtns').style.display = 'none';
      document.getElementById('mainContentWrapper').style.display = 'none';
      document.getElementById('userInfoBar').style.display = 'none';
    }
    
    async function checkAutoLogin() {
      let savedQq = localStorage.getItem('zihua_auth_qq');
      if (!savedQq) return false;
      const authLayer = document.getElementById('authLayer');
      authLayer.style.display = 'flex';
      let loadingDiv = document.createElement('div');
      loadingDiv.className = 'auth-loading-overlay';
      loadingDiv.innerHTML = `<div class="auth-loading-box"><div class="auth-loading-spinner"></div><div class="auth-loading-text">正在登录中……请稍后</div></div>`;
      authLayer.appendChild(loadingDiv);
      let users = await fetchUsersFromCloud();
      let user = users.find(u => u.qq === savedQq);
      if (!user || user.status !== 'active' || (user.expireTs && Date.now() > user.expireTs)) { loadingDiv.remove(); return false; }
      let devId = getDeviceId();
      if (user.bindDevice && user.bindDevice !== devId) { loadingDiv.remove(); return false; }
      if (!user.bindDevice) { loadingDiv.remove(); return false; }
      currentUser = user;
      loadingDiv.remove();
      onLoginSuccess(user);
      return true;
    }
    
    function showTipsToast() {
      let oldTip = document.querySelector('.tips-toast');
      if (oldTip) oldTip.remove();
      let tipDiv = document.createElement('div');
      tipDiv.className = 'tips-toast';
      tipDiv.innerHTML = `<div class="tips-title">🐾温馨提示🐾</div><div class="tips-content"><p>1. 🐾开启所需的功能后，打开防闪功能，然后断网重连即可实现龙宫不闪退</p><p>2. 🐾除雾打开没有效果就断网重连一下即可</p><p>3. 🐾武器无后摇开启前需要用对应武器攻击两下再开启，如开启没效果就关掉重新攻击两下再开启（桃木剑不可用）</p><p>4. 🐾同一角色换不同皮肤都需要恢复原皮再换</p><p>5. 🐾需要定制自己喜欢的样式和播放器里的歌曲可以点击右上角联系作者</p></div><button class="tips-btn" id="closeTipsBtn">🐾我晓得啦🐾</button>`;
      document.body.appendChild(tipDiv);
      document.getElementById('closeTipsBtn').onclick = () => tipDiv.remove();
    }
    
    // 下拉菜单
    function setupDropdowns() {
      const dropdowns = [
        { btn: document.getElementById('adminBtnLogin'), container: document.getElementById('adminDropdownLogin') },
        { btn: document.getElementById('adminBtnMain'), container: document.getElementById('adminDropdownMain') },
        { btn: document.getElementById('groupBtnLogin'), container: document.getElementById('groupDropdownLogin') }
      ];
      dropdowns.forEach(({ btn, container }) => {
        if (!btn || !container) return;
        btn.onclick = (e) => {
          e.stopPropagation();
          container.classList.toggle('open');
        };
        document.addEventListener('click', function closeAll(e) {
          if (!container.contains(e.target)) {

    function parseAddress(ptrStr) {
      try {
        var parts = ptrStr.split('+');
        var rangeList = h5gg.getRangesList(parts[0]);
        if (!rangeList || rangeList.length === 0) return null;
        var addr = Number(rangeList[0].start);
        for (var i = 1; i < parts.length; i++) {
          if (i === 1) addr += Number(parts[i]);
          else {
            var val = h5gg.getValue(addr, 'I64');
            if (val === undefined) throw new Error('读取失败');
            addr = Number(val) + Number(parts[i]);
          }
        }
        return '0x' + addr.toString(16).toUpperCase();

      document.getElementById(id).classList.add("active");
    }
    
    function selRole(name) {
      currentRole = name;
      document.getElementById("partRoleTitle").innerText = name;
      goSkinPage("katou-part");
    }
    
    function goPart(part) {
      let id, titleId, listId;
      if (part == "头") { id = "head-skin"; titleId = "headTitle"; listId = "headList"; }
      else if (part == "脸") { id = "face-skin"; titleId = "faceTitle"; listId = "faceList"; }
      else { id = "body-skin"; titleId = "bodyTitle"; listId = "bodyList"; }
      document.getElementById(titleId).innerText = `${part == "头" ? "🐾头部" : part == "脸" ? "脸部" : "身体"} - ${currentRole}`;
      let list = document.getElementById(listId);
      list.innerHTML = "";
      let skins = Object.keys(skinData[currentRole]).filter(s => s !== "原皮" && skinData[currentRole][s][part]);
      skins.forEach(skin => {
        let btn = document.createElement("button");
        btn.className = "skin-btn";
        btn.innerText = skin;
        btn.onclick = () => {
          showConfirm(`是否应用【${currentRole}】${part == "头" ? "头部" : part == "脸" ? "脸部" : "身体"}：${skin}`, () => {
            applySinglePart(currentRole, part, skin);
            confirmLayer.style.display = "none";
          });
        };
        list.appendChild(btn);
      });
      goSkinPage(id);
    }
    
    function hpRole(name) {
      currentRole = name;
      document.getElementById("hpTitle").innerText = name;
      let list = document.getElementById("hpList");
      list.innerHTML = "";
      let skins = Object.keys(skinData[currentRole]).filter(s => s !== "原皮");
      skins.forEach(skin => {
        let btn = document.createElement("button");
        btn.className = "skin-btn";
        btn.innerText = skin;
        btn.onclick = () => {
          showConfirm(`是否给应用【${currentRole}】皮肤：${skin}`, () => {
            applySkin(currentRole, skin);
            confirmLayer.style.display = "none";
          });
        };
        list.appendChild(btn);
      });
      let restoreBtn = document.createElement("button");
      restoreBtn.className = "restore-skin-btn";
      restoreBtn.innerText = "🐾 恢复原皮 🐾";
      restoreBtn.onclick = () => {
        showConfirm(`是否恢复【${currentRole}】原皮？`, () => {
          restoreOriginalSkin(currentRole);
          confirmLayer.style.display = "none";
        });
      };
      list.appendChild(restoreBtn);
      goSkinPage("huanpi-skin");
    }
    
    function applySinglePart(role, part, skinName) {
      if (!window.h5gg) { showToast('未检测到H5GG环境'); return; }
      const targetSkin = skinData[role][skinName];
      const original = skinData[role].原皮[part];
      if (!targetSkin || !targetSkin[part] || !original) { showToast('皮肤数据缺失'); return; } 
      try {
        h5gg.searchNumber(original, 'I32', '0x100000000', '0x160000000');
        const count = h5gg.getResultsCount?.() || h5gg.getResultCount?.() || 0;
        if (count > 0) {
          h5gg.editAll(targetSkin[part], 'I32');
          showToast('应用成功');
        } else showToast('应用失败');
        h5gg.clearResults();
      } catch(e) { showToast('操作失败'); }
    }
    
    function applySkin(role, skin) {
      if (!window.h5gg) { showToast('未检测到H5GG环境'); return; }
      const o = skinData[role].原皮;
      const t = skinData[role][skin];
      let ok = false;
      try {
        ['头', '脸', '衣'].forEach(k => {
          if (!t[k] || !o[k]) return;
          h5gg.searchNumber(o[k], 'I32', '0x100000000', '0x160000000');
          const c = h5gg.getResultsCount?.() || h5gg.getResultCount?.() || 0;
          if (c > 0) {
            h5gg.editAll(t[k], 'I32');
            ok = true;
          }
          h5gg.clearResults();
        });
        showToast(ok ? '应用成功' : '应用失败');
      } catch(e) { showToast('操作失败'); }
    }
    
    function restoreOriginalSkin(role) {
      if (!window.h5gg) { showToast('未检测到H5GG环境'); return; }
      if (!role || !skinData[role]) { showToast('请先选择角色！'); return; }
      const o = skinData[role].原皮;
      let ok = false;
      try {
        for (let s in skinData[role]) {
          if (s === '原皮') continue;
          const t = skinData[role][s];
          ['头', '脸', '衣'].forEach(k => {
            if (!t[k] || !o[k]) return;
            h5gg.searchNumber(t[k], 'I32', '0x100000000', '0x160000000');
            const c = h5gg.getResultsCount?.() || h5gg.getResultCount?.() || 0;
            if (c > 0) {
              h5gg.editAll(o[k], 'I32');
              ok = true;
            }
            h5gg.clearResults();
          });
        }
        showToast(ok ? '已恢复原皮' : '恢复失败');
      } catch(e) { showToast('恢复失败'); }
    }
    
    function showConfirm(msg, okFn) {
      confirmText.innerText = msg;
      confirmLayer.style.display = "flex";
      document.getElementById("confirmYes").onclick = okFn;
      document.getElementById("confirmNo").onclick = () => { confirmLayer.style.display = "none"; };
    }
    const roleNames = ["小黄", "爱丽丝", "零", "阿念", "逍遥", "薇薇安", "巫铃儿", "莉莉", "艾伦", "爱德华", "兰", "小满", "临云"];
    const katouGrid = document.getElementById("katouRoleGrid");
    if (katouGrid) {
      roleNames.forEach(name => {
        let btn = document.createElement("button");
        btn.className = "role-btn";
        btn.innerText = name;
        btn.onclick = () => selRole(name);
        katouGrid.appendChild(btn);
      });
    }
    const huanpiGrid = document.getElementById("huanpiRoleGrid");
    if (huanpiGrid) {
      roleNames.forEach(name => {
        let btn = document.createElement("button");
        btn.className = "role-btn";
        btn.innerText = name;
        btn.onclick = () => hpRole(name);
        huanpiGrid.appendChild(btn);
      });
    }
    
    // ========== 音乐播放器（不变） ==========
    const MUSIC_API = { token: "6C41B0BD6950A80DE0B68A7684376BAE", url: "https://api.suol.cc/v1/yy_sq.php" };
    const STATIC_PLAYLIST = [
      { name: "雪下的时候", artist: "乔佳旭" },
      { name: "unravel", artist: "Ado" },
      { name: "masayumechasing", artist: "" },
      { name: "brave heart", artist: "" }
    ];
    
    let audio = null;
    let currentSongIndex = 0;
    let isPlaying = false;
    let repeatMode = 0;
    let currentSongUrl = null;
    let isLoading = false;
    
    function collapsePlaylist() {
      const container = document.getElementById('playlistContainer');
      const arrow = document.querySelector('.fold-arrow');
      if (container && container.classList.contains('open')) container.classList.remove('open');
      if (arrow && arrow.classList.contains('open')) arrow.classList.remove('open');
    }
    
    function renderStaticPlaylist() {
      const container = document.getElementById('playlistContainer');
      if (!container) return;
      container.innerHTML = '';
      STATIC_PLAYLIST.forEach((song, idx) => {
        const div = document.createElement('div');
        div.className = 'playlist-item';
        div.setAttribute('data-index', idx);
        div.innerText = `${song.name}${song.artist ? ' - ' + song.artist : ''}`;
        div.onclick = () => { playSongByIndex(idx); };
        container.appendChild(div);
      });
      refreshPlaylistActive();
    }
    
    function refreshPlaylistActive() {
      const items = document.querySelectorAll('.playlist-item');
      items.forEach((item, idx) => {
        const dataIdx = parseInt(item.getAttribute('data-index'));
        if (dataIdx === currentSongIndex) item.classList.add('active');
        else item.classList.remove('active');
      });
    }
    
    function destroyAudio() {
      if (audio) {
        audio.pause();
        audio.src = '';
        audio.removeEventListener('canplay', null);
        audio.removeEventListener('error', null);
        audio.removeEventListener('ended', null);
        audio.removeEventListener('timeupdate', null);
        audio = null;
      }
      currentSongUrl = null;
      isPlaying = false;
      document.getElementById("playPauseBtn").innerText = "▶";
    }
    
    async function fetchSongUrl(songName, artist) {
      try {
        const query = `${songName} ${artist}`.trim();
        const res = await fetch(`${MUSIC_API.url}?type=qq&msg=${encodeURIComponent(query)}&n=1&m_token=${MUSIC_API.token}`);
        const data = await res.json();
        if (data.code === 200 && data.url) return data;
        return null;
      } catch (e) { return null; }
    }
    
    async function playSongByIndex(index) {
      if (isLoading) { showToast("正在加载中，请稍后"); return; }
      if (index < 0 || index >= STATIC_PLAYLIST.length) return;
      collapsePlaylist();
      const song = STATIC_PLAYLIST[index];
      const songTitle = `${song.name}${song.artist ? ' - ' + song.artist : ''}`;
      document.getElementById("songTitle").innerText = `加载中... ${songTitle}`;
      isLoading = true;
      destroyAudio();
      try {
        const result = await fetchSongUrl(song.name, song.artist);
        if (!result || !result.url) { showToast("获取歌曲链接失败"); document.getElementById("songTitle").innerText = songTitle; isLoading = false; return; }
        audio = new Audio();
        audio.src = result.url;
        audio.load();
        audio.addEventListener('canplay', () => {
          audio.play().then(() => {
            isPlaying = true;
            document.getElementById("playPauseBtn").innerText = "⏸";
            document.getElementById("songTitle").innerText = `${result.name} - ${result.singer || '未知'}`;
            currentSongIndex = index;
            currentSongUrl = result.url;
            refreshPlaylistActive();
            isLoading = false;
          }).catch(err => { showToast("播放失败: " + err.message); document.getElementById("songTitle").innerText = songTitle; isLoading = false; });
        }, { once: true });
        audio.addEventListener('error', () => { if (audio.error) showToast("音频加载错误"); document.getElementById("songTitle").innerText = songTitle; isLoading = false; }, { once: true });
        audio.addEventListener("ended", () => {
          if (repeatMode === 0) nextSong();
          else if (repeatMode === 1) audio.play().catch(e => console.warn);
          else { audio.pause(); isPlaying = false; document.getElementById("playPauseBtn").innerText = "▶"; }
        });
        audio.addEventListener("timeupdate", () => { const pct = (audio.currentTime / audio.duration) * 100 || 0; document.getElementById("progressBar").value = pct; });
        document.getElementById("progressBar").addEventListener("input", () => { if (!audio || !audio.duration) return; audio.currentTime = (document.getElementById("progressBar").value / 100) * audio.duration; });
      } catch (err) { showToast("加载失败"); document.getElementById("songTitle").innerText = songTitle; isLoading = false; }
    }
    
    async function togglePlay() {
      if (!audio || !currentSongUrl) await playSongByIndex(currentSongIndex);
      else {
        if (isPlaying) { audio.pause(); isPlaying = false; document.getElementById("playPauseBtn").innerText = "▶"; }
        else { audio.play().catch(e => showToast("播放失败")); isPlaying = true; document.getElementById("playPauseBtn").innerText = "⏸"; }
      }
    }
    
    async function prevSong() { let idx = currentSongIndex - 1; if (idx < 0) idx = STATIC_PLAYLIST.length - 1; currentSongIndex = idx; await playSongByIndex(currentSongIndex); }
    async function nextSong() { let idx = currentSongIndex + 1; if (idx >= STATIC_PLAYLIST.length) idx = 0; currentSongIndex = idx; await playSongByIndex(currentSongIndex); }
    function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; const txt = ["🔁", "🔂", "⏹"]; document.getElementById("repeatBtn").innerText = txt[repeatMode]; }
    function initMusicUI() {
      renderStaticPlaylist();
      currentSongIndex = 0;
      refreshPlaylistActive();
      document.getElementById("songTitle").innerText = "让我们嗨起来好吗？";
      document.getElementById('foldBar').onclick = function() { const container = document.getElementById('playlistContainer'); const arrow = document.querySelector('.fold-arrow'); container.classList.toggle('open'); arrow.classList.toggle('open'); };
      document.getElementById("playPauseBtn").onclick = togglePlay;
      document.getElementById("prevBtn").onclick = prevSong;
      document.getElementById("nextBtn").onclick = nextSong;
      document.getElementById("repeatBtn").onclick = toggleRepeat;
    }
    
    // ========== 启动所有功能（绑定开关事件） ==========
    function startAllFeatures() {
      if (window._featuresStarted) return;
      window._featuresStarted = true;
      createBubbles();
      
      // 防闪
      const antiSwitch = document.getElementById('antiCrashSwitch');
      if (antiSwitch) antiSwitch.addEventListener('change', function(e) { antiCrashPlaceholder(this.checked); });
      
      // 夜视开关 + 滑块
      const nightToggle = document.getElementById('nightToggle');
      const nightSlider = document.getElementById('nightSlider');
      if (nightToggle) nightToggle.addEventListener('change', function(e) { controlNight(this.checked); });
      if (nightSlider) {
        nightSlider.addEventListener('input', function(e) { updateNightStrength(parseInt(e.target.value)); });
      }
      
      // 广角开关 + 滑块
      const wideToggle = document.getElementById('wideToggle');
      const wideSlider = document.getElementById('wideSlider');
      if (wideToggle) wideToggle.addEventListener('change', function(e) { controlWide(this.checked); });
      if (wideSlider) {
        wideSlider.addEventListener('input', function(e) { updateWideStrength(parseInt(e.target.value)); });
      }
      
      // 除雾开关
      const fogToggle = document.getElementById('fogToggle');
      if (fogToggle) fogToggle.addEventListener('change', function(e) { toggleFog(); });
      
      // 显棺
      const boxBtn = document.getElementById('boxBtn');
      if (boxBtn) boxBtn.addEventListener('change', function(e) { controlCoffin(this.checked); });
      
      // 除磁
      const magBtn = document.getElementById('magBtn');
      if (magBtn) magBtn.addEventListener('change', function(e) { longgong(this.checked); });
      
      // 武器无后摇
      const shortGun = document.getElementById('shortGunToggle');
      if (shortGun) shortGun.addEventListener('change', e => toggleWalkieTalkie(e.target.checked));
      document.querySelectorAll('.weapon-switch').forEach(sw => {
        sw.addEventListener('change', e => handleWeaponSwitch(sw.dataset.weapon, e.target.checked));
      });
      
      // 页面切换
      const slotCards = document.querySelectorAll('.slot-card');
      const contentItems = document.querySelectorAll('.content-item');
      slotCards.forEach(card => {
        card.addEventListener('click', () => {
          const targetId = card.dataset.target;
          if (!targetId) return;
          slotCards.forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          contentItems.forEach(item => item.classList.remove('active'));
          const targetContent = document.getElementById(targetId);
          if (targetContent) targetContent.classList.add('active');
          if (targetId === 'content3') {
            document.querySelectorAll("#content3 .skin-page").forEach(p => p.classList.remove('active'));
            const skinMain = document.getElementById('skin-main');
            if (skinMain) skinMain.classList.add('active');
          }
        });
      });
      
      initMusicUI();
    }
    
    function createBubbles() {
      const panel = document.getElementById('panel');
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          const bubble = document.createElement('div');
          bubble.className = 'bubble';
          const size = Math.random() * 40 + 10;
          bubble.style.width = `${size}px`;
          bubble.style.height = `${size}px`;
          bubble.style.left = `${Math.random() * 310 + 15}px`;
          bubble.style.animationDuration = `${Math.random() * 6 + 7}s`;
          bubble.style.animationDelay = `${Math.random() * 3}s`;
          panel.appendChild(bubble);
        }, i * 50);
      }
    }
    
    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', async () => {
      setupDropdowns();
      setupAdminCopy();
      document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.onclick = () => {
          let type = tab.dataset.tab;
          document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById('loginForm').style.display = type === 'login' ? 'flex' : 'none';
          document.getElementById('registerForm').style.display = type === 'register' ? 'flex' : 'none';
        };
      });
      document.getElementById('doLoginBtn').onclick = async () => {
        let btn = document.getElementById('doLoginBtn');
        let originalText = btn.innerText;
        btn.innerHTML = '<span class="loading-spinner"></span>登录中...';
        btn.disabled = true;
        let qq = document.getElementById('loginQq').value.trim();
        let pwd = document.getElementById('loginPwd').value;
        let res = await login(qq, pwd);
        if (res.ok) { onLoginSuccess(res.user); } else { showToast(res.msg); }
        btn.innerHTML = originalText;
        btn.disabled = false;
      };
      document.getElementById('doRegisterBtn').onclick = async () => {
        let btn = document.getElementById('doRegisterBtn');
        let originalText = btn.innerText;
        btn.innerHTML = '<span class="loading-spinner"></span>提交中...';
        btn.disabled = true;
        let qq = document.getElementById('regQq').value.trim();
        let pwd = document.getElementById('regPwd').value;
        let res = await submitApplication(qq, pwd);
        showToast(res.msg);
        if (res.ok) { document.querySelector('.auth-tab[data-tab="login"]').click(); }
        btn.innerHTML = originalText;
        btn.disabled = false;
      };
      document.getElementById('tipsBtn').onclick = showTipsToast;
      let auto = await checkAutoLogin();
      if (!auto) {
        document.getElementById('authLayer').style.display = 'flex';
        document.getElementById('mainHeaderBtns').style.display = 'none';
        document.getElementById('mainContentWrapper').style.display = 'none';
      } else {
        startAllFeatures();
      }
    });
  </script>
</body>
